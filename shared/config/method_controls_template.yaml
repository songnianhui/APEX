enumerate:
  target_sz: null
  forced_oxidation: null
  max_configs: null

uhf:
  conv_tol: 1.0e-08
  max_cycle: 2000
  stabilize_cycles: 20
  level_shift: 0.3
  damp: 0.2
  newton_refine: false
  newton_max_cycle: 8

ccsd:
  code: pyscf
  # Record-only on the active-space FCIDUMP route. The actual Hamiltonian basis
  # is inherited from APEX_CAS FCIDUMP generation (`tzp-dkh` for this case).
  basis_set: cc-pVDZ

ccsd_t:
  code: pyscf
  # Record-only on the active-space FCIDUMP route. This value is ignored
  # numerically; the active-space Hamiltonian still comes from `tzp-dkh`.
  basis_set: cc-pVDZ
  n_final: 5

ccsdt:
  code: hast_ucc
  # Record-only on the active-space FCIDUMP route. This value is ignored
  # numerically; the active-space Hamiltonian still comes from `tzp-dkh`.
  basis_set: cc-pVDZ
  n_final: 5
  conv_tol: 1.0e-08
  residual_tol: 1.0e-06
  max_cycle: 2000
  lambda_max_cycle: 500
  diis_space: 6
  diis_start_cycle: 0
  iterative_damping: 1.0
  level_shift: 0.0
  newton_krylov: false

dmrg_basis:
  localization_method: pm
  cc_conv_tol: 1.0e-08
  cc_max_cycle: 2000
  cc_diis_space: 12
  cc_direct: false
  pm_pop_method: Mulliken
  pm_conv_tol: 1.0e-08
  pm_conv_tol_grad: null
  pm_max_cycle: 100
  pm_exponent: 2
  pm_init_guess: atomic
  boys_conv_tol: 1.0e-08
  boys_conv_tol_grad: null
  boys_max_cycle: 100
  ordering_matrix_mode: exchange_proxy
  exchange_proxy_max_orbitals: 64
  ga_generations: 100
  ga_population: 50
  ga_mutation_rate: 0.1
  ga_seed: 17

dmrg:
  backend: pyscf_dmrgci_sz
  basis_mode: original_identity
  schedule_mode: benchmark
  bond_dims:
    # Chan 2026 Fe2S2 oxidized benchmark coverage:
    # UDMRG Table 7: 100, 200, 400, 600, 800, 1000, 1200, 1600, 2000, 2400
    # SA-DMRG Table 5 also reports D=12000 ("12k"), but that point is
    # intentionally omitted from the local session controls because it is too
    # expensive for this workstation.
    - 100
    - 200
    - 400
    - 600
    - 800
    - 1000
    - 1200
    - 1600
    - 2000
    - 2400
  n_sweeps: 30
  convergence_tol: 1.0e-08
  n_threads: 4
  stack_mem: 2147483648
  twosite_to_onesite: null
  dav_max_iter: null
  dav_def_max_size: null
  dav_rel_conv_thrd: null
  dav_type: null

fno_uccsdtq:
  freeze_occ:
    - 2
    - 4
    - 6
