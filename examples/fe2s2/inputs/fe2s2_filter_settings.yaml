# APEX_Filter settings for [Fe2S2(SCH3)4]2- (oxidized)
#
# Intended use:
#   1. Run `apex-cas scf`
#   2. Run `apex-cas buildcas`
#   3. Edit `selection.txt` as needed
#   4. Run `apex-cas fcidump`
#   5. Run `apex-filter load`
#   6. Continue with `enumerate -> uhf -> ...`
#
# Step-2-and-later numerical / selection controls now live in:
#   filter_session/method_controls.yaml

apex_cas_case_dir: examples/fe2s2
structure_path: inputs/fe2s2.xyz
cluster_info_path: inputs/fe2s2_cluster_info.yaml
fcidump_path: outputs/fcidump/FCIDUMP.*

charge: -2
spin: 0.0
symmetry_group: "C1"
reduction_symmetry: "C1"
family_scheme: "literature_fe2s2_dimer"
benchmark_profile: "chan_fe2s2_2017"
config_reduction_mode: "none"

scf_method: "uks"
xc_functional: "BP86"
basis_set_default: "tzp-dkh"
relativistic: "sf-x2c"
solvation_model: "none"
